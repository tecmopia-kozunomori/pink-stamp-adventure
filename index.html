<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>テクモピア - 探検ラリー</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-bg: #050505; 
            --container-bg: #111;
            --primary: #00f2fe; /* ネオンブルー */
            --accent: #ff00de;  /* ネオンピンク */
            --staff-color: #39ff14; /* ネオングリーン */
            --text-color: #ffffff;
            --pixel-font: 'Press Start 2P', cursive;
            --jp-pixel-font: 'DotGothic16', sans-serif;
        }
        
        body { 
            font-family: 'Hiragino Sans', sans-serif; 
            background-color: var(--main-bg); 
            margin: 0; 
            color: var(--text-color);
            overflow-x: hidden;
        }

        .container { 
            max-width: 480px; 
            margin: 0 auto; 
            min-height: 100vh; 
            background: var(--container-bg); 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            border-left: 2px solid #222;
            border-right: 2px solid #222;
        }

        /* ヘッダー：ネオンタイトル */
        .header { 
            background: #000;
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 4px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.2);
        }
        .header h1 { 
            margin: 0; 
            font-size: 2.2rem; 
            font-family: var(--pixel-font);
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary), 0 0 40px var(--primary);
            letter-spacing: 2px;
        }
        .header p { 
            margin: 10px 0 0; 
            font-size: 0.9rem; 
            font-family: var(--jp-pixel-font);
            color: var(--accent);
            text-shadow: 0 0 5px var(--accent);
        }

        .screen { 
            display: none; 
            padding: 30px 20px; 
            flex-grow: 1; 
            animation: fadeIn 0.4s ease-out;
        }
        .active { display: flex; flex-direction: column; align-items: center; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* スタンプのデザイン修正：はみ出し防止 */
        .stamp-rally { 
            display: flex; 
            justify-content: space-around; 
            width: 100%; 
            margin: 40px 0; 
            gap: 15px;
        }
        .stamp { 
            width: 140px; 
            height: 140px; 
            border: 3px solid #333; 
            border-radius: 20px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: #1a1a1a; 
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            padding: 10px;
        }
        .stamp.on { 
            border: 3px solid var(--accent); 
            background: #fff; 
            box-shadow: 0 0 20px var(--accent);
        }
        
        .stamp-icon { 
            font-size: 3.5rem; 
            margin-bottom: 5px; 
            filter: grayscale(1) opacity(0.3);
        }
        .stamp.on .stamp-icon { 
            filter: grayscale(0) opacity(1);
            animation: stampBounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes stampBounce {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .stamp small { 
            font-size: 0.8rem; 
            color: #666; 
            font-family: var(--jp-pixel-font);
            text-align: center;
            line-height: 1.2;
            word-break: break-all;
        }
        .stamp.on small { color: #000; font-weight: bold; }

        /* ボタン：共通 */
        .btn { 
            border: none; padding: 20px; width: 100%; border-radius: 12px; 
            font-size: 1.2rem; font-family: var(--jp-pixel-font); 
            color: white; cursor: pointer; transition: 0.2s; 
            box-shadow: 0 6px 0 #008ba3; 
            background: var(--primary);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn:disabled { background: #444; color: #888; box-shadow: 0 6px 0 #222; }

        .btn-staff { 
            background: var(--staff-color); 
            box-shadow: 0 6px 0 #2db30f; 
            color: #000; 
            font-weight: bold;
        }

        .btn-close {
            background: var(--accent);
            box-shadow: 0 6px 0 #b3009b;
            margin-top: 20px;
        }

        /* ガラポン演出 */
        #garapon-stage { position: relative; width: 200px; height: 200px; margin: 30px 0; }
        #garapon-unit {
            width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="%2300f2fe" stroke-width="4" stroke-dasharray="8,4"/><path d="M50 10 L50 90 M10 50 L90 50" stroke="%23ff00de" stroke-width="1" opacity="0.5"/></svg>') center center no-repeat;
            display: flex; justify-content: center; align-items: center; font-size: 4rem;
        }
        .spin-anime { animation: rotate 0.1s infinite linear; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 結果エリア */
        .result-box { 
            display: none; border: 4px double var(--accent); border-radius: 15px; 
            padding: 20px; background
