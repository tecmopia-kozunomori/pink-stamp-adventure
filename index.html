<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>テクモピア - 探検ラリー</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-bg: #050505; 
            --container-bg: #111;
            --primary: #00f2fe; /* ネオンブルー */
            --accent: #ff00de;  /* ネオンピンク */
            --staff-color: #39ff14; /* ネオングリーン */
            --text-color: #ffffff;
            --pixel-font: 'Press Start 2P', cursive;
            --jp-pixel-font: 'DotGothic16', sans-serif;
        }
        
        body { 
            font-family: 'Hiragino Sans', sans-serif; 
            background-color: var(--main-bg); 
            margin: 0; 
            color: var(--text-color);
            overflow-x: hidden;
        }

        .container { 
            max-width: 480px; 
            margin: 0 auto; 
            min-height: 100vh; 
            background: var(--container-bg); 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            border-left: 2px solid #222;
            border-right: 2px solid #222;
        }

        /* ヘッダー：ネオンタイトル */
        .header { 
            background: #000;
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 4px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.2);
        }
        .header h1 { 
            margin: 0; 
            font-size: 2.2rem; 
            font-family: var(--pixel-font);
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary), 0 0 40px var(--primary);
            letter-spacing: 2px;
        }
        .header p { 
            margin: 10px 0 0; 
            font-size: 0.9rem; 
            font-family: var(--jp-pixel-font);
            color: var(--accent);
            text-shadow: 0 0 5px var(--accent);
        }

        .screen { 
            display: none; 
            padding: 30px 20px; 
            flex-grow: 1; 
            animation: fadeIn 0.4s ease-out;
        }
        .active { display: flex; flex-direction: column; align-items: center; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* スタンプのデザイン修正：はみ出し防止 */
        .stamp-rally { 
            display: flex; 
            justify-content: space-around; 
            width: 100%; 
            margin: 40px 0; 
            gap: 15px;
        }
        .stamp { 
            width: 140px; 
            height: 140px; 
            border: 3px solid #333; 
            border-radius: 20px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: #1a1a1a; 
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            padding: 10px;
        }
        .stamp.on { 
            border: 3px solid var(--accent); 
            background: #fff; 
            box-shadow: 0 0 20px var(--accent);
        }
        
        .stamp-icon { 
            font-size: 3.5rem; 
            margin-bottom: 5px; 
            filter: grayscale(1) opacity(0.3);
        }
        .stamp.on .stamp-icon { 
            filter: grayscale(0) opacity(1);
            animation: stampBounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes stampBounce {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .stamp small { 
            font-size: 0.8rem; 
            color: #666; 
            font-family: var(--jp-pixel-font);
            text-align: center;
            line-height: 1.2;
            word-break: break-all;
        }
        .stamp.on small { color: #000; font-weight: bold; }

        /* ボタン：共通 */
        .btn { 
            border: none; padding: 20px; width: 100%; border-radius: 12px; 
            font-size: 1.2rem; font-family: var(--jp-pixel-font); 
            color: white; cursor: pointer; transition: 0.2s; 
            box-shadow: 0 6px 0 #008ba3; 
            background: var(--primary);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn:disabled { background: #444; color: #888; box-shadow: 0 6px 0 #222; }

        .btn-staff { 
            background: var(--staff-color); 
            box-shadow: 0 6px 0 #2db30f; 
            color: #000; 
            font-weight: bold;
        }

        .btn-close {
            background: var(--accent);
            box-shadow: 0 6px 0 #b3009b;
            margin-top: 20px;
        }

        /* ガラポン演出 */
        #garapon-stage { position: relative; width: 200px; height: 200px; margin: 30px 0; }
        #garapon-unit {
            width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="none" stroke="%2300f2fe" stroke-width="4" stroke-dasharray="8,4"/><path d="M50 10 L50 90 M10 50 L90 50" stroke="%23ff00de" stroke-width="1" opacity="0.5"/></svg>') center center no-repeat;
            display: flex; justify-content: center; align-items: center; font-size: 4rem;
        }
        .spin-anime { animation: rotate 0.1s infinite linear; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 結果エリア */
        .result-box { 
            display: none; border: 4px double var(--accent); border-radius: 15px; 
            padding: 20px; background: rgba(0,0,0,0.8); margin-top: 20px; width: 100%; box-sizing: border-box;
            box-shadow: 0 0 20px var(--accent);
        }
        .result-header { 
            font-family: var(--jp-pixel-font); font-size: 2rem; margin-bottom: 10px; 
            color: var(--accent); text-shadow: 0 0 10px var(--accent);
        }
        .result-desc { font-size: 1.1rem; color: #fff; line-height: 1.5; font-family: var(--jp-pixel-font); }

        /* 通知ポップアップ */
        #get-notif {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--accent); color: white; padding: 20px 40px; border-radius: 10px;
            font-family: var(--jp-pixel-font); font-size: 1.5rem; z-index: 1000; display: none;
            box-shadow: 0 0 30px var(--accent); animation: popMsg 1.5s ease-out forwards;
        }
        @keyframes popMsg {
            0% { opacity: 0; transform: translate(-50%, -30%); }
            20%, 80% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -70%); }
        }

        /* 終了画面：クール＆キュート */
        .end-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center; padding: 20px;
        }
        .end-title { 
            font-family: var(--pixel-font); font-size: 2.5rem; color: #ff0055;
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; margin: 0;
        }
        .end-msg { 
            font-family: var(--jp-pixel-font); font-size: 1.2rem; color: var(--primary); 
            margin-top: 20px; text-shadow: 0 0 5px var(--primary);
        }
        .end-icon { font-size: 5rem; margin: 30px 0; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="get-notif">スタンプGET!!</div>

    <div class="header">
        <h1>TECMOPIA</h1>
        <p>MISSION: 探検ラリー</p>
    </div>

    <div id="screen-rally" class="screen active">
        <div class="stamp-rally">
            <div id="st-1" class="stamp"><span class="stamp-icon">🔑</span><small>B1<br>ミニクレ</small></div>
            <div id="st-2" class="stamp"><span class="stamp-icon">🎮</span><small>3F<br>テクモピア</small></div>
        </div>
        <p style="text-align:center; font-family: var(--jp-pixel-font); color:var(--primary); margin-bottom: 30px;">
            店舗を回ってスタンプをコンプリートせよ！
        </p>
        <button id="to-check-btn" class="btn" disabled onclick="showScreen('screen-check')">2箇所達成！スタッフ確認へ</button>
    </div>

    <div id="screen-check" class="screen" style="text-align:center;">
        <h3 style="color:var(--accent); font-family: var(--jp-pixel-font); font-size: 1.8rem;">STAFF CHECK</h3>
        <p style="font-family: var(--jp-pixel-font);">3Fカウンターのスタッフに<br>この画面を見せてください</p>
        <div style="font-size: 5rem; margin: 20px; filter: drop-shadow(0 0 10px var(--accent));">🎁</div>
        <button class="btn btn-staff" onclick="staffApprove()">スタッフ確認済み</button>
        <button style="background:none; border:none; color:#666; margin-top:20px; cursor:pointer; font-family: var(--jp-pixel-font);" onclick="showScreen('screen-rally')">BACK TO RALLY</button>
    </div>

    <div id="screen-garapon" class="screen" style="text-align:center;">
        <h3 style="color:var(--primary); font-family: var(--jp-pixel-font); font-size: 1.8rem;">LUCKY DRAW</h3>
        <div id="garapon-stage"><div id="garapon-unit">🎡</div></div>
        <button id="draw-btn" class="btn" onclick="runGarapon()">ガラポンを回す！</button>
        
        <div id="result-area" class="result-box">
            <h2 id="result-grade" class="result-header"></h2>
            <p id="result-desc" class="result-desc"></p>
            <p style="font-size:0.8rem; color:var(--accent); margin-top:15px; font-weight:bold;">※この画面をスタッフに提示してください</p>
            <button class="btn btn-close" onclick="closeAndFinish()">終了する (閉じる)</button>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbySrqbkG3sX5kzAZwshkQMOR6M1J2bkXPOtfzHzFs-x6d-rWT23nPHBN8W-hwWAm79lzQ/exec";
    const todayStr = new Date().toLocaleDateString();

    // データの読み込み
    const stamps = JSON.parse(localStorage.getItem('tp_stamps')) || [];
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    // 🌟 スタンプ獲得処理
    let isNewStamp = false;
    if (id && !stamps.includes(id) && stamps.length < 2) {
        stamps.push(id);
        localStorage.setItem('tp_stamps', JSON.stringify(stamps));
        isNewStamp = true;
    }

    function updateUI() {
        stamps.forEach(s => {
            const el = document.getElementById(`st-${s}`);
            if (el) {
                el.classList.add('on');
                if (isNewStamp && s === id) {
                    document.getElementById('get-notif').style.display = 'block';
                }
            }
        });
        if (stamps.length >= 2) {
            document.getElementById('to-check-btn').disabled = false;
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function staffApprove() {
        if(confirm("スタッフ専用：ガラポンを開始します。よろしいですか？")) showScreen('screen-garapon');
    }

    function runGarapon() {
        const btn = document.getElementById('draw-btn');
        const unit = document.getElementById('garapon-unit');
        btn.disabled = true;
        unit.classList.add('spin-anime');

        setTimeout(() => {
            unit.classList.remove('spin-anime');
            const rand = Math.random() * 100;
            let res = { g: "", d: "", color: "" };

            if (rand < 3.0) res = { g: "1等", d: "金：クレーンゲーム6回無料", color: "#FFD700" }; 
            else if (rand < 7.0) res = { g: "2等", d: "銀：メダル50枚 ＋ 増量券", color: "#C0C0C0" }; 
            else if (rand < 12.0) res = { g: "3等", d: "赤：クレーンゲーム3回無料", color: "#FF4444" }; 
            else if (rand < 18.0) res = { g: "4等", d: "黄：メダル30枚 ＋ 増量券", color: "#FFEB3B" }; 
            else if (rand < 25.0) res = { g: "5等", d: "ピンク：クレーンゲーム1回無料", color: "#FF69B4" }; 
            else if (rand < 40.0) res = { g: "6等", d: "水色：メダル10枚 ＋ 増量券", color: "#00BCD4" }; 
            else res = { g: "7等", d: "白：クレーンゲーム1回増量券", color: "#FFFFFF" };

            unit.innerText = res.g;
            unit.style.color = res.color;
            unit.style.textShadow = `0 0 15px ${res.color}`;
            
            document.getElementById('result-grade').innerText = "WIN: " + res.g;
            document.getElementById('result-grade').style.color = res.color;
            document.getElementById('result-desc').innerText = res.d;
            document.getElementById('result-area').style.display = 'block';

            saveResultToSheet(res.g);
            localStorage.setItem('tp_used', todayStr);
            btn.style.display = "none";
        }, 2000);
    }

    function saveResultToSheet(grade) {
        fetch(`${GAS_URL}?grade=${encodeURIComponent(grade)}`, { mode: 'no-cors' });
    }

    // 終了処理
    function closeAndFinish() {
        localStorage.removeItem('tp_stamps'); 
        location.reload();
    }

    // 1日1回制限のチェック
    if (localStorage.getItem('tp_used') === todayStr) {
        document.body.innerHTML = `
            <div class="end-screen">
                <h2 class="end-title">GAME OVER</h2>
                <div class="end-icon">🎮✨</div>
                <p class="end-msg">本日の探検は終了しました！<br>また明日挑戦してね！</p>
                <p style="color:#444; font-size:0.8rem; margin-top:20px; font-family:var(--pixel-font);">SEE YOU NEXT TIME</p>
            </div>`;
    } else {
        updateUI();
    }
</script>
</body>
</html>
